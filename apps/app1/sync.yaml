---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: app1
  namespace: app1
spec:
  interval: 5m
  releaseName: app1
  chart:
    spec:
      chart: app1
      version: 0.1.1
      sourceRef:
        kind: HelmRepository
        name: helm-charts
        namespace: flux-system
  dependsOn: []
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app1
spec:
  interval: 48h
  prune: true
  # wait: true
  # timeout: 3m0s
  # retryInterval: 2m0s
  # force: false
  sourceRef:
    kind: HelmRelease
    name: app1
  patches:
    - patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: app1
          namespace: app1
        spec:
          valuesFrom:
            - kind: ConfigMap
              name: values-latest
              valuesKey: values.yaml
      target:
        kind: HelmRelease
        name: app1