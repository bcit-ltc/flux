# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/ocirepository-source-v1.json
---
# Watches `oci/{appName}` registries for new chart versions
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: oci-repository
spec:
  interval: 1h

  # `app-name` is substituted by the component `config-matcher`
  url: oci://ghcr.io/bcit-ltc/oci/app-name
  ref:
    semver: '>= 1.0.0'
