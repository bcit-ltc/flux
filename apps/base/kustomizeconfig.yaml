# This file is for teaching kustomize how to substitute names
nameReference:

# Update the ImagePolicy spec.imageRepositoryRef with the name of the corresponding ImageRepository
- kind: ImageRepository
  fieldSpecs:
    - kind: ImagePolicy
      path: spec/imageRepositoryRef

# Update the ImageUpdateAutomation spec.sourceRef.name with the name of the corresponding GitRepository
- kind: GitRepository
  fieldSpecs:
    - kind: ImageUpdateAutomation
      path: spec/sourceRef/name

# Update the HelmRelease spec.chartRef.name with the name of the corresponding OCIRepository
- kind: OCIRepository
  fieldSpecs:
    - kind: HelmRelease
      path: spec/chartRef/name
