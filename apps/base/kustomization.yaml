---
# Base kustomization for all apps
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gitrepository.yaml
  - helmrelease.yaml
  - imagepolicy.yaml
  - imagerepository.yaml
  - imageupdateautomation.yaml
  - namespace.yaml
  - ocirepository.yaml

# Teach kustomize how to update generated names
configurations:
  - kustomizeconfig.yaml
