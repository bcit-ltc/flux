---
# Filters images to select and sort the most recent one
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: image-policy
spec:
  imageRepositoryRef:
    name: image-repository

  # Image selection policy filter: {semverTag}
  #   eg. 1.0.0
  filterTags:
    pattern: '^(?<major>0|[1-9]\d*)\.(?<minor>0|[1-9]\d*)\.(?<patch>0|[1-9]\d*)$'
  policy:
    semver:
      range: '>=1.0.0'
