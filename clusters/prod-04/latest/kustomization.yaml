apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../apps
  # - ../../../infrastructure

labels:
- includeSelectors: true
  pairs:
    environment: latest

# Create a single resource for this environment that can be used by replacements.
#
configMapGenerator:
  - name: flux-env
    literals:
      - fluxEnv=latest
    options:
      annotations:
        config.kubernetes.io/local-config: "true"

patches:

  # Update oci repository ref selection to target all *.rc images
  #     eg. 2.4.10-rc.7731b9b1+1684912629
  - target:
      kind: OCIRepository
    patch: |-
      - op: replace
        path: /spec/ref/semver
        value: ">=1.0.0-0"
      - op: add
        path: /spec/ref/semverFilter
        value: ".*-rc.*"
