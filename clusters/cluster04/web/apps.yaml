# Deploys apps
#
# - test build with:
#   flux build kustomization apps --path ./apps --kustomization-file clusters/base/apps.yaml --dry-run
#
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
  annotations:
    config.fluxcd.io/workload-type: app
spec:
  interval: 24h
  wait: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/infrastructure-documentation
  # dependsOn:
  #   - name: cloudnative-pg-config
  # # to test kustomization
  components:
    - ../../components/env-web
